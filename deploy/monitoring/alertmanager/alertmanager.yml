# Alertmanager config — routes incoming alerts from Prometheus to ntfy.sh.
#
# ntfy.sh is an HTTP pub/sub notification service.  Alertmanager POSTs
# each alert's default JSON payload to the topic URL; ntfy's server
# auto-detects the Alertmanager payload shape and formats it into a
# clean phone notification.  See https://docs.ntfy.sh for details.
#
# Receiver secret:
#   The full ntfy topic URL (e.g. "https://ntfy.sh/bpt-alerts-XXXXX?...")
#   is NOT in this file.  It's loaded at service start from systemd-creds
#   into $CREDENTIALS_DIRECTORY; alertmanager reads via webhook_configs.url_file.
#   The topic name IS the secret — treat it like a password.
#
# Re-route precedence:
#   Routes are evaluated top-down; the first match wins.  Critical
#   alerts use the `ntfy-critical` receiver (urgent priority, rotating-light tag);
#   warnings use `ntfy-warning` (default priority, warning tag).
#
# Inhibit rules:
#   When an upstream cause is already firing, downstream effects are
#   suppressed.  Documented inline below.

global:
  resolve_timeout: 5m

route:
  # Top-level catch-all — routes below override per severity
  receiver: ntfy-critical
  # Group alerts by (alertname, severity, exchange) so OKX + HL
  # disconnects arrive as one message not two, but different alert
  # types stay distinct.
  group_by: ['alertname', 'severity', 'exchange']
  # 10s gives time for related alerts to batch; overridden to 0s for critical.
  group_wait: 10s
  # Resend while still firing so a breaker stuck on for hours doesn't
  # get forgotten, but not spammily.
  repeat_interval: 4h
  # How long to wait before adding new alerts to an existing group.
  group_interval: 5m

  routes:
    - matchers:
        - severity="critical"
      receiver: ntfy-critical
      group_wait: 0s           # critical fires immediately
      repeat_interval: 1h      # remind every hour until resolved

    - matchers:
        - severity="warning"
      receiver: ntfy-warning
      group_wait: 2m           # batch warnings in 2-minute windows
      repeat_interval: 6h

# ─── Receivers ────────────────────────────────────────────────────────
#
# Both receivers target the same ntfy topic, but with different URL
# query parameters so the phone-side priority / tag / notification-sound
# differ per severity.  On Android / iOS, priority=urgent bypasses Do
# Not Disturb if the operator has granted that permission to the ntfy
# app — so critical alerts ring at 3am even if the phone is silenced.
#
# The url_file contents should be the FULL URL including query string.
# Example for critical:
#   https://ntfy.sh/bpt-alerts-XXXX?priority=urgent&tags=rotating_light&title=BPT+CRITICAL
# Example for warning:
#   https://ntfy.sh/bpt-alerts-XXXX?priority=default&tags=warning&title=BPT+WARNING

receivers:
  - name: ntfy-critical
    webhook_configs:
      - url_file: /run/credentials/bpt-alertmanager.service/bpt-ntfy-url-critical
        send_resolved: true
        # ntfy auto-formats the Alertmanager JSON payload — no template
        # configured here (webhook_configs doesn't support templates; the
        # formatting happens server-side in ntfy).

  - name: ntfy-warning
    webhook_configs:
      - url_file: /run/credentials/bpt-alertmanager.service/bpt-ntfy-url-warning
        send_resolved: true

# ─── Inhibit rules ────────────────────────────────────────────────────
# When an upstream cause is already firing, don't also page on
# downstream effects that are expected consequences.

inhibit_rules:
  # DailyLossLatch tripping rejects all new orders — the transient
  # effects (reject rate climbing briefly before the latch is fully
  # processed) shouldn't also page.
  - source_matchers:
      - alertname="DailyLossLatchTripped"
    target_matchers:
      - alertname="RejectRateBreakerTripped"
    equal: []   # inhibit globally, not per-label

  # ServiceDown inhibits every warning from the same service — e.g. if
  # bpt-md-gateway is down, we don't need a stack of MDGatewayQuiet and
  # AdapterDisconnected warnings on top of the critical ServiceDown.
  - source_matchers:
      - severity="critical"
      - alertname="ServiceDown"
    target_matchers:
      - severity="warning"
    equal: [service]
