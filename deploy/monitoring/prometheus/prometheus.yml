# Prometheus scrape + rule config for the bpt-core stack.
# Read at process start from $BPT_ROOT/deploy/monitoring/prometheus/prometheus.yml
# (symlinked via the bpt-prometheus.service unit).

global:
  scrape_interval: 15s      # default scrape cadence — alerts fire 2-3 intervals later
  evaluation_interval: 15s  # rule evaluation cadence
  external_labels:
    env: local              # overridden per-host if you ever run multi-env monitoring

# Tell Prometheus where to send firing alerts.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Load rule files — every file under rules/ gets picked up.
rule_files:
  - rules/*.yml

# Scrape targets — one job per service. ports match the metrics_port set in
# each service's TOML config. Add/remove as the deploy layout changes.
scrape_configs:
  # bpt-prometheus scrapes itself so "ServiceDown" can't fire on its own
  # metrics (would be circular).  Kept for completeness of the targets
  # view — failures log but don't alert.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: alertmanager
    static_configs:
      - targets: ['localhost:9093']

  - job_name: bpt-transport
    # Aeron MediaDriver (bifrost-fabric). Port 9100 per config.yaml default.
    static_configs:
      - targets: ['localhost:9100']
        labels: { service: 'transport' }

  - job_name: bpt-md-gateway
    static_configs:
      - targets: ['localhost:9102']
        labels: { service: 'md-gateway' }

  - job_name: bpt-order-gateway
    static_configs:
      # order-gateway metrics_port varies per env; default 9103. Adjust if
      # your heimdall.*.toml binds elsewhere.
      - targets: ['localhost:9103']
        labels: { service: 'order-gateway' }

  - job_name: bpt-strategy
    static_configs:
      - targets: ['localhost:9104']
        labels: { service: 'strategy' }

  - job_name: bpt-refdata
    static_configs:
      - targets: ['localhost:9105']
        labels: { service: 'refdata' }

  - job_name: bpt-analytics
    # bpt-analytics doesn't expose metrics today (per audit); entry reserved
    # for when it does. Scrape failures will fire ServiceDown today — comment
    # the job out or keep it quiet until metrics land.
    static_configs:
      - targets: ['localhost:9106']
        labels: { service: 'analytics' }
