name: Build + deploy portfolio site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow only one concurrent deploy; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: site/requirements.txt

      - name: Install MkDocs + Material
        working-directory: site
        run: pip install -r requirements.txt

      - name: Build site
        working-directory: site
        run: mkdocs build --strict --site-dir _build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
