name: Release

# Tagged releases (v*) build a deployable tarball in CI and attach it to
# a GitHub Release. workflow_dispatch is the on-demand path for builds
# without cutting a tag (artifact only, no Release).
#
# The tarball produced here is byte-equivalent to running
# deploy/package-release.sh locally — same script, same Bazel build.
# CI's value is build reproducibility (clean Ubuntu runner, no laptop
# state), an immutable artifact tied to a SHA, and a permanent download
# URL on the Release page.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (default: <semver>+<sha>)'
        required: false
        default: ''

permissions:
  contents: write   # needed to create a Release on tag push

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release build mid-way

jobs:
  build-tarball:
    name: Build deployable tarball
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # package-release.sh reads git short-sha + dirty flag

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Bazel with caching
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          external-cache: true

      - name: Install system deps (openssl headers for Bazel-built targets)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config

      # Run Bazel tests before packaging so a broken release never leaves
      # the runner. cpp-bazel job does the same on every PR; this is a
      # belt-and-suspenders gate before the tarball ships.
      - name: Bazel test //...
        run: bazel test //... --test_output=errors

      - name: Resolve VERSION label
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >>"$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >>"$GITHUB_OUTPUT"
          else
            # Fall back to package-release.sh's default (semver+sha).
            echo "version=" >>"$GITHUB_OUTPUT"
          fi

      - name: Build release tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./deploy/package-release.sh

      - name: Compute SHA256 checksum
        run: |
          cd dist
          sha256sum bpt-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpt-release
          path: |
            dist/bpt-*.tar.gz
            dist/SHA256SUMS
          retention-days: 30

      # Tag-triggered runs additionally publish a GitHub Release with
      # the tarball + checksum attached. softprops/action-gh-release
      # creates the Release if it doesn't exist and uploads assets.
      - name: Create GitHub Release (tag push only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bpt-*.tar.gz
            dist/SHA256SUMS
          body: |
            Tagged release ${{ github.ref_name }}.

            Built from `${{ github.sha }}` in a clean Ubuntu 24.04 runner.
            Verify with:

            ```sh
            sha256sum -c SHA256SUMS
            ```

            Deploy on a target host:

            ```sh
            scp bpt-${{ github.ref_name }}.tar.gz user@host:/tmp/
            ssh user@host 'BPT_DEPLOY_ROOT=/opt/bpt /opt/bpt/current/scripts/deploy.sh /tmp/bpt-${{ github.ref_name }}.tar.gz'
            ```
          generate_release_notes: true
