name: ci-mapping

# Validates any PR that touches the committed instrument-mapping JSONs under
# config/instruments/. Catches mass deletions, canonical-id renumbering, and
# schema-shape violations before they reach main.
#
# The `mapping-override` label on the PR bypasses the mass-delete threshold
# only (the id-stability and schema checks always run).

on:
  pull_request:
    paths:
      - "config/instruments/**.json"
      - "bpt-ops/bpt_ops/jobs/instrument_mapping/validate_diff.py"
      - ".github/workflows/ci-mapping.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install bpt-ops
        working-directory: bpt-ops
        run: uv sync --extra dev

      - name: Extract baseline config/instruments/ from the PR's base ref
        run: |
          mkdir -p /tmp/baseline/config/instruments
          if git ls-tree -r "origin/${{ github.base_ref }}" --name-only -- 'config/instruments/*.json' | grep -q .; then
            git ls-tree -r "origin/${{ github.base_ref }}" --name-only -- 'config/instruments/*.json' |
              while read -r path; do
                target="/tmp/baseline/$path"
                mkdir -p "$(dirname "$target")"
                git show "origin/${{ github.base_ref }}:$path" > "$target"
              done
          else
            echo "No baseline mapping files in ${{ github.base_ref }} — skipping diff; shape validation still runs."
          fi

      - name: Check for mapping-override label
        id: label
        run: |
          if gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' | grep -qx 'mapping-override'; then
            echo "override=--override" >> "$GITHUB_OUTPUT"
            echo "mapping-override label present — mass-delete threshold skipped"
          else
            echo "override=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run validate_diff
        working-directory: bpt-ops
        run: |
          uv run python -m bpt_ops.jobs.instrument_mapping.validate_diff \
            --previous /tmp/baseline/config/instruments \
            --new ../config/instruments \
            ${{ steps.label.outputs.override }}
