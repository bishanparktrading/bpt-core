# Exchange adapter endpoints — TESTNET / demo trading
# Source of truth for testnet REST endpoints used by bpt-book.
# Edit this file when adding a new exchange or changing an endpoint.

[[adapters]]
exchange       = "HYPERLIQUID"
testnet        = true
rest_host      = "api.hyperliquid-testnet.xyz"
rest_port      = "443"
# Public address — safe to commit. For mainnet / multiple accounts
# this would move to a secret to avoid accidental mix-ups.
wallet_address = "0x87b8D67Dd5B4aF939F6c53b18a711BF2654c4d9d"
