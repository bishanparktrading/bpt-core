# Instance config — QA environment, Hyperliquid testnet.
#
# bpt-book is read-only: polls each configured exchange's account
# endpoints, normalizes into a flat (venue, sub_account, ccy) balance
# list, publishes on Aeron. No order flow.
#
# HL's account endpoints (/info clearinghouseState + spotClearinghouseState)
# are public — they accept any wallet address. No secret_name needed
# for HL in testnet. Other venues (OKX/Binance/Deribit) will require
# read-only API keys when their adapters land; those use the same
# systemd-creds / ~/.bpt-secrets pattern as bpt-order-gateway.
# Deployment profile (env + exchange filter + exchange-endpoints path).
profile_config = "../deploy/config/profile/qa-hyperliquid.toml"

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[book]
# Poll every 5 s. HL rate-limits /info generously; 5 s is comfortably
# under. Dashboards read the last published snapshot, so this cadence
# sets the UI refresh floor.
poll_interval_ms = 5000

[metrics]
port = 9104

[logging]
level = "info"
dir   = "logs"
