# Prometheus scrape + rule config for bpt-core local ops monitoring.
#
# Services run on the docker host (WSL in dev, bare metal in prod); we
# reach them via host.docker.internal which the compose file maps to
# the host-gateway address. Ports correspond to metrics_port in each
# service's TOML.
#
# Job names track the current service identity (post-rename 2026-04-17:
# bpt-order-gateway→bpt-ogw, bpt-md-gateway→bpt-mdgw, bpt-refdata→bpt-rfd, fenrir→bpt-strategy,
# tyr→bpt-analytics). The service label uses the abbreviated form to
# match the process `comm` field set via prctl in bpt-app.

global:
  scrape_interval: 5s          # ops dashboards want sub-10s freshness
  evaluation_interval: 15s
  external_labels:
    cluster: bpt-local
    env: qa

# Tell Prometheus where to send firing alerts. The `alertmanager`
# hostname resolves via docker-compose's default network.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load alert rules. Prometheus container bind-mounts ./rules/ at
# /etc/prometheus/rules/ (see docker-compose.yml).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: bpt-transport
    # bpt-transport Aeron MediaDriver. Moved off 9100 (collides with
    # prometheus-node-exporter) to 9110 on 2026-04-21.
    static_configs:
      - targets: ['host.docker.internal:9110']
        labels:
          service: transport

  - job_name: node-exporter
    # Host-level metrics (CPU / memory / disk / network / loadavg /
    # filesystem) from prometheus-node-exporter. Installed via apt,
    # runs as a system service on :9100.
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: host

  - job_name: process-exporter
    # Per-process metrics (RSS / VSZ / CPU seconds / open FDs / thread
    # count) from prometheus-process-exporter. Matches bpt-* processes
    # by comm name — see monitoring/process-exporter.yml.
    static_configs:
      - targets: ['host.docker.internal:9256']
        labels:
          service: processes

  - job_name: bpt-md-gateway
    static_configs:
      - targets: ['host.docker.internal:9102']
        labels:
          service: md-gateway

  - job_name: bpt-order-gateway
    static_configs:
      - targets: ['host.docker.internal:9103']
        labels:
          service: order-gateway

  - job_name: bpt-strategy
    static_configs:
      - targets: ['host.docker.internal:9104']
        labels:
          service: strategy

  - job_name: bpt-refdata
    static_configs:
      - targets: ['host.docker.internal:9101']
        labels:
          service: refdata

  - job_name: bpt-analytics
    # bpt-analytics doesn't expose metrics today (per metrics audit
    # 2026-04-20); entry reserved for when it does. ServiceDown alert
    # will fire until metrics land — either add metrics or comment
    # this job out to silence the noise.
    static_configs:
      - targets: ['host.docker.internal:9106']
        labels:
          service: analytics

  - job_name: bpt-tape
    # The recorder binds metrics to 127.0.0.1:9111 on a remote host
    # (tape-hl-tokyo-01, ap-northeast-1). 9111 keeps it disjoint from
    # bpt-transport's 9110, so a single Prometheus can scrape both
    # without label collisions. To make this scrape work, run an SSH
    # tunnel from the prometheus host before starting the stack:
    #
    #   ssh -L 9111:127.0.0.1:9111 -N -f \
    #       -i ~/.ssh/bpt_tape_ed25519 ubuntu@13.193.107.7
    #
    # Then host.docker.internal:9111 reaches the recorder's metrics
    # endpoint. Tunnel survives across `docker compose up` cycles.
    # When we have a permanent monitoring host in-VPC, switch this to
    # the recorder's private IP (10.42.1.221:9111) and drop the tunnel.
    static_configs:
      - targets: ['host.docker.internal:9111']
        labels:
          service: tape
          venue: hyperliquid
          host: tape-hl-tokyo-01

  - job_name: tape-host
    # node-exporter on the tape recorder host (NOT the trading-host
    # node-exporter at 9100, which scrapes the laptop). Reach it via
    # the same SSH tunnel pattern as bpt-tape:
    #
    #   ssh -L 9120:127.0.0.1:9100 -N -f \
    #       -i ~/.ssh/bpt_tape_ed25519 ubuntu@13.193.107.7
    #
    # 9120 locally → 9100 on the remote, so it doesn't clash with the
    # laptop's own node-exporter on 9100. Disk-free panels in the
    # bpt-tape Grafana dashboard pull from this job's
    # node_filesystem_avail_bytes{mountpoint="/opt/bpt/data"}.
    static_configs:
      - targets: ['host.docker.internal:9120']
        labels:
          service: host
          host: tape-hl-tokyo-01
