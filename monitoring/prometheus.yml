# Prometheus scrape config for bpt-core local ops monitoring.
#
# The bpt services run on the docker host (WSL), so we scrape them via
# host.docker.internal which docker-compose maps to the host gateway.

global:
  scrape_interval: 5s          # ops dashboards want sub-10s freshness
  evaluation_interval: 15s
  external_labels:
    cluster: bpt-local
    env: qa

scrape_configs:
  - job_name: heimdall
    static_configs:
      - targets: ['host.docker.internal:9103']
        labels:
          service: heimdall

  - job_name: huginn
    static_configs:
      - targets: ['host.docker.internal:9102']
        labels:
          service: huginn

  - job_name: muninn
    static_configs:
      - targets: ['host.docker.internal:9101']
        labels:
          service: muninn

  - job_name: fenrir
    static_configs:
      - targets: ['host.docker.internal:9104']
        labels:
          service: fenrir

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
