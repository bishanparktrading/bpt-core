# Alertmanager config — routes incoming alerts from Prometheus to PagerDuty.
#
# PagerDuty's Events API v2 accepts a JSON payload keyed by a per-service
# routing_key (the "integration key"). Alertmanager's pagerduty_configs
# receiver handles the payload shape natively — no webhook template needed.
#
# Receiver secret:
#   The 32-char integration key is NOT in this file. It's loaded at service
#   start via docker-compose bind mount from ~/.config/bpt/pagerduty-integration-key
#   (mode 0600). Alertmanager reads it via pagerduty_configs.routing_key_file.
#   Treat the key like an API credential — PagerDuty can rotate it at the
#   integration's service-detail page in the UI.
#
# Re-route precedence:
#   Routes are evaluated top-down; the first match wins. Critical alerts
#   use the `pd-critical` receiver (severity=critical → PagerDuty's
#   escalation policy fires phone calls); warnings use `pd-warning`
#   (severity=warning → mobile push only, no phone ring).
#
# repeat_interval vs PagerDuty escalation:
#   PagerDuty re-pages on its own cadence per the escalation policy
#   ("notify again after N minutes if not acked"). Alertmanager's
#   repeat_interval is set high (24h for critical) so it doesn't
#   simultaneously re-trigger the same incident — let PagerDuty own
#   the repage rhythm.
#
# Inhibit rules:
#   When an upstream cause is already firing, downstream effects are
#   suppressed. Documented inline below.

global:
  resolve_timeout: 5m

route:
  # Top-level catch-all — routes below override per severity
  receiver: pd-critical
  # Group alerts by (alertname, severity, exchange) so OKX + HL
  # disconnects arrive as one message not two, but different alert
  # types stay distinct.
  group_by: ['alertname', 'severity', 'exchange']
  # 10s gives time for related alerts to batch; overridden to 0s for critical.
  group_wait: 10s
  # Resend while still firing so a breaker stuck on for hours doesn't
  # get forgotten — but low cadence because PagerDuty owns the repage.
  repeat_interval: 24h
  # How long to wait before adding new alerts to an existing group.
  group_interval: 5m

  routes:
    - matchers:
        - severity="critical"
      receiver: pd-critical
      group_wait: 0s           # critical fires immediately
      repeat_interval: 24h     # PagerDuty handles repage cadence

    - matchers:
        - severity="warning"
      receiver: pd-warning
      group_wait: 2m           # batch warnings in 2-minute windows
      repeat_interval: 24h

# ─── Receivers ────────────────────────────────────────────────────────
#
# Both receivers target the same PagerDuty service (same routing_key).
# severity field drives PagerDuty-side behaviour: critical triggers the
# phone-call escalation step in the policy; warning stops at mobile push.
# send_resolved=true so PagerDuty closes the incident when the underlying
# metric recovers — otherwise incidents stay OPEN forever and need manual
# resolve.

receivers:
  - name: pd-critical
    pagerduty_configs:
      # docker-compose bind-mounts ~/.config/bpt to /etc/bpt/creds (ro).
      - routing_key_file: /etc/bpt/creds/pagerduty-integration-key
        severity: critical
        send_resolved: true
        description: '{{ .CommonLabels.alertname }} — {{ .CommonAnnotations.summary }}'

  - name: pd-warning
    pagerduty_configs:
      - routing_key_file: /etc/bpt/creds/pagerduty-integration-key
        severity: warning
        send_resolved: true
        description: '{{ .CommonLabels.alertname }} — {{ .CommonAnnotations.summary }}'

# ─── Inhibit rules ────────────────────────────────────────────────────
# When an upstream cause is already firing, don't also page on
# downstream effects that are expected consequences.

inhibit_rules:
  # DailyLossLatch tripping rejects all new orders — the transient
  # effects (reject rate climbing briefly before the latch is fully
  # processed) shouldn't also page.
  - source_matchers:
      - alertname="DailyLossLatchTripped"
    target_matchers:
      - alertname="RejectRateBreakerTripped"
    equal: []   # inhibit globally, not per-label

  # ServiceDown inhibits every warning from the same service — e.g. if
  # bpt-md-gateway is down, we don't need a stack of MDGatewayQuiet and
  # AdapterDisconnected warnings on top of the critical ServiceDown.
  - source_matchers:
      - severity="critical"
      - alertname="ServiceDown"
    target_matchers:
      - severity="warning"
    equal: [service]
