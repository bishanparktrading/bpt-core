# Instance config — BACKTEST mode, HL mainnet refdata.
#
# Used when AS-on-APE backtest needs the full HL universe (testnet has only
# 4 coins). Pulls reference data from HL mainnet REST — read-only, no orders.

environment = "dev"
exchange_config = "config/exchanges/backtest-hl-mainnet.toml"
exchanges = ["HYPERLIQUID"]
instrument_poll_interval_s = 3600

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.snapshot]
channel = "aeron:ipc"
stream_id = 1001

[aeron.delta]
channel = "aeron:ipc"
stream_id = 1002

[aeron.control]
channel = "aeron:ipc"
stream_id = 1003

[aeron.fee_schedule]
channel = "aeron:ipc"
stream_id = 1004

[aeron.refdata_status]
channel = "aeron:ipc"
stream_id = 1006

[instrument_mapping]
local_path = "/opt/bpt/data/instrument_mapping.json"

[instrument_mapping.sources]
hyperliquid = "../config/instruments/instrument_mapping.hyperliquid.json"

[metrics]
port = 9101

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 1000
