# Instance config — QA environment, Deribit testnet.
environment = "qa"
exchange_config = "config/exchanges/testnet.toml"
exchanges = ["DERIBIT"]

[aeron]
media_driver_dir = "/dev/shm/aeron-bifrost"

[aeron.order]
channel = "aeron:ipc"
stream_id = 3001

[aeron.exec_report]
channel = "aeron:ipc"
stream_id = 3002

[aeron.heartbeat]
channel = "aeron:ipc"
stream_id = 3003

[aeron.account_snapshot]
channel = "aeron:ipc"
stream_id = 3004    # Heimdall -> Fenrir (AccountSnapshot)

[heimdall]
heartbeat_interval_ms = 1000
stale_order_timeout_ms = 120000

[heimdall.risk]
trading_enabled = true
max_order_size_usd = 10000.0
max_notional_per_order_usd = 10000.0
max_open_orders_per_venue = 20
max_orders_per_second = 10

[metrics]
port = 9103
