environment    = "dev"

[simulation]
start              = "2026-04-25T00:00:00Z"
end                = "2026-04-25T23:59:59Z"
allow_partial_data = true

[simulation.latency]
cex_base_ms           = 2
hyperliquid_base_ms   = 200
hyperliquid_jitter_ms = 50

[data]
local_cache = "/opt/bpt/data/backtest-cache"
hyperliquid_refdata_snapshot = "/opt/bpt/data/raw/hyperliquid/2026-04-25/meta.json"

# Instruments must match exchange-native symbols in the Parquet files.
# They must also be a subset of what bpt-strategy is configured to trade.
[[instruments]]
exchange = "OKX"
symbol   = "BTC-USDT"

[[instruments]]
exchange = "HYPERLIQUID"
symbol   = "APE"

[endpoints]
binance_md_port       = 18100
okx_md_port           = 18101
hyperliquid_md_port   = 18102
binance_order_port    = 18110
okx_order_port        = 18111
hyperliquid_order_port = 18112
hyperliquid_info_port  = 18113

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.backtest_control]
channel   = "aeron:ipc"
stream_id = 9002

[aeron.backtest_ack]
channel   = "aeron:ipc"
stream_id = 9001

[logging]
level = "info"
dir   = "logs/backtest"

[metrics]
port = 9105

[results]
# Personal-account starting capital (matches the HL backtester configs).
starting_capital = 1000.0

# Per-venue fee table. Looked up by FillReport.exchange + liquidity_role.
# Default-tier rates — adjust if the live account is at a higher VIP tier.
#   OKX SPOT (BTC-USDT):    maker 8 bps, taker 10 bps
#   HL  PERP (APE):         maker 1.5 bps, taker 4.5 bps
[results.fees.OKX]
maker_bps = 8.0
taker_bps = 10.0

[results.fees.HYPERLIQUID]
maker_bps = 1.5
taker_bps = 4.5
