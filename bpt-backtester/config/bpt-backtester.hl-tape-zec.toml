environment    = "dev"

# Sibling of bpt-backtester.hl-tape.toml — same 2026-04-25 cache, but
# replays HL ZEC instead of APE. Spec to validate that the Phase 1
# dimensional fixes generalize across price scales: ZEC mid ~$356 vs
# APE ~$0.18, a ~2000x ratio. Quote behavior should stay sane on both.

[simulation]
start              = "2026-04-25T00:00:00Z"
end                = "2026-04-25T23:59:59Z"
allow_partial_data = true

[simulation.latency]
cex_base_ms           = 2
hyperliquid_base_ms   = 200
hyperliquid_jitter_ms = 50

[data]
local_cache = "/opt/bpt/data/backtest-cache"
hyperliquid_refdata_snapshot = "/opt/bpt/data/raw/hyperliquid/2026-04-25/meta.json"

[[instruments]]
exchange = "HYPERLIQUID"
symbol   = "ZEC"

[endpoints]
binance_md_port        = 18100
okx_md_port            = 18101
hyperliquid_md_port    = 18102
binance_order_port     = 18110
okx_order_port         = 18111
hyperliquid_order_port = 18112
hyperliquid_info_port  = 18113

[aeron]
media_driver_dir = "/dev/shm/aeron-bpt"

[aeron.backtest_control]
channel   = "aeron:ipc"
stream_id = 9002

[aeron.backtest_ack]
channel   = "aeron:ipc"
stream_id = 9001

[logging]
level = "info"
dir   = "logs/backtest"

[metrics]
port = 9105

[results]
starting_capital = 1000.0

[results.fees.HYPERLIQUID]
maker_bps = 1.5
taker_bps = 4.5
