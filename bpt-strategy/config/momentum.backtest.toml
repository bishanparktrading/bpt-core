# Instance config — BACKTEST mode, momentum strategy on OKX BTC/USDT SPOT.
# BBO-driven so it works without trade parquet files in the cache.  Purpose:
# pipeline verification — exercises the order / exec report / bridge chain.

environment    = "dev"
backtest_mode  = true
strategy_config = "strategies/momentum.backtest.toml"

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[fenrir]
correlation_id = 1004

[metrics]
port = 9104
