# Instance config — BACKTEST mode, AvellanedaStoikov on HL ZEC.
# Sibling of avellaneda_stoikov.backtest.toml (APE) — same Aeron
# topology, just points at the ZEC params file. Use to validate
# Phase 1 dimensional fixes generalize across price scales (ZEC
# mid ~$356 vs APE ~$0.18).

# Deployment profile (env only; strategy keeps its own md_exchanges).
profile_config = "../deploy/config/profile/backtest-hl.toml"

backtest_mode  = true
strategy_config = "strategies/avellaneda_stoikov.zec.backtest.toml"

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[fenrir]
correlation_id = 1006

[metrics]
port = 9104
