environment = "qa"
strategy_config = "strategies/vwap_reversion.swap.toml"

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[fenrir]
correlation_id = 2001

[metrics]
port = 9104

[logging]
level             = "info"
dir               = "logs"
flush_level       = "warn"
flush_interval_ms = 0       # flush on warn+ only; set >0 for periodic flush in prod
