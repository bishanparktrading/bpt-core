# Deployment profile (env only; strategy keeps its own md_exchanges).
profile_config = "../deploy/config/profile/qa-hyperliquid.toml"

strategy_config = "strategies/funding_arb.hyperliquid.toml"

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[fenrir]
correlation_id = 1007

[metrics]
# Distinct from avellaneda_stoikov.qa-hyperliquid.toml (9104) so both
# strategy variants can coexist on the same host if desired.
port = 9106
