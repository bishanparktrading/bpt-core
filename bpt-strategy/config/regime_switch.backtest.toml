# Instance config — BACKTEST mode, AvellanedaStoikov on HL APE.
# Replays raw HL mainnet ticks captured by the recording rig through
# bpt-backtester's HyperliquidMdServer/HyperliquidOrderServer.

environment    = "dev"
backtest_mode  = true
strategy_config = "strategies/regime_switch.backtest.toml"

# Shared aeron stream registry — see deploy/config/aeron/streams.toml.
aeron_config = "../deploy/config/aeron/streams.toml"

[aeron]
# Fallback only — shared file wins when present.
media_driver_dir = "/dev/shm/aeron-bpt"

[fenrir]
correlation_id = 1006

[metrics]
port = 9134
