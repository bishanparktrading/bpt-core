# Strategy params — BACKTEST mode, AS on OKX BTC-USDT-SWAP.
# Sanity-check config for the OKX canon ingester (trades + L2 NDJSON
# from https://www.okx.com/en-sg/historical-data → canon).
#
# BTC-USDT-SWAP is a tight-spread market (~1.3 bps at $76k mid) — AS
# won't make money here vs. fees. The point is to validate the data
# pipeline: orders place, book reconciles, fills emit, P&L computes.
# Real research-grade backtests should pick a wider-spread alt-perp
# (see [[feedback_market_selection]] in operator memory).

[strategy]
type = "AvellanedaStoikovStrategy"
enabled = true
instruments = ["BTC/USDT:PERPETUAL"]
md_exchanges = ["OKX"]

[strategy.venue_exec.OKX]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[strategy.risk]
max_position_usd = 10000.0
max_order_size_usd = 1000.0
max_daily_loss_usd = 2000.0
max_open_orders = 10

[strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["OKX"]

[strategy.params]
gamma = 0.05
kappa = 15.0
session_duration_s = 3600

vol_halflife_s = 60.0
vol_warmup_ticks = 20

kappa_halflife_s = 45.0
kappa_warmup_ticks = 10
kappa_min = 5.0

# BTC-USDT-SWAP tick is $0.1 on $76k mid = 1.3 bps. Setting max half-spread
# to 5 bps gives the strategy room to quote one tick outside the touch.
max_half_spread_bps = 5.0
min_half_spread_bps = 1.0

# OKX BTC-USDT-SWAP contracts are $0.01 BTC each (very fine), so 0.01
# qty = $0.76 notional. Order size 0.1 ≈ $7.6 notional, max inventory
# 1.0 BTC ≈ $76k.
order_qty = 0.1
requote_threshold = 0.002
max_inventory = 1.0

# Subscribe L2 ladder so matching engine seeds venue slots from the L2
# canon stream. depth=20 matches what the L2 ingester emits.
order_book_depth = 20

order_qty_fraction     = 0
order_qty_min          = 0.01
max_inventory_fraction = 0

drift_halflife_s    = 15.0
drift_suppress_bps  = 50.0
drift_suppress_sigma_mult = 10.0

slow_drift_window_s     = 120.0
slow_drift_suppress_bps = 200.0
slow_drift_suppress_sigma_mult = 20.0

tox_suppress_threshold = -100.0

vol_gate_max_bps    = 100.0
vol_gate_window_ms  = 1000
vol_gate_halt_ms    = 0
vol_gate_sigma_mult = 5.0

gamma_pnl_window_n             = 20
gamma_pnl_loss_threshold_usd   = -25.0
gamma_pnl_profit_threshold_usd = 100.0
gamma_pnl_widen_mult           = 1.5
gamma_pnl_tighten_mult         = 0.85

pause_below_rpnl_usd = -10000.0
pause_cooldown_s     = 300.0

post_fill_markout_threshold_bps = 0.0
post_fill_markout_cooldown_s    = 10.0

[strategy.params.fair_value]
mode = "micro"
