# Strategy params — BACKTEST mode, AS on HL ZEC.
# Validation profile: ZEC mid ~$356, ~0.8 bps median spread (vs APE
# at ~$0.18 / ~10 bps). Goal is to confirm the Phase 1 dimensional
# fixes produce sane quotes across price scales — not to be profitable.
# Spread on ZEC is structurally too tight for AS to clear HL fees
# (need >9 bps for round-trip taker; ZEC has <1 bps), so 0 fills is
# an acceptable outcome here. The signal we want is "no negative bids,
# no sanity-clamp warnings, drift/inventory skew bounded."

[fenrir.strategy]
type = "AvellanedaStoikovStrategy"
enabled = true
instruments = ["ZEC/USD:PERPETUAL"]
md_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.venue_exec.HYPERLIQUID]
enabled = true
latency_budget_us = 5000
order_type = "LIMIT"
tif = "GTC"
max_retries = 3

[fenrir.strategy.risk]
max_position_usd = 1000.0
max_order_size_usd = 100.0
max_daily_loss_usd = 200.0
max_open_orders = 10

[fenrir.strategy.schedule]
require_refdata_ready = true
md_staleness_threshold_ms = 10000
max_refdata_staleness_ns = 300000000000
configured_exchanges = ["HYPERLIQUID"]

[fenrir.strategy.params]
gamma = 0.05
kappa = 15.0
session_duration_s = 3600

vol_halflife_s = 60.0
vol_warmup_ticks = 20

kappa_halflife_s = 45.0
kappa_warmup_ticks = 10
kappa_min = 5.0

max_half_spread_bps = 12.0

# ZEC sized for $1k account: 0.03 ZEC × $356 ≈ $10.68 per order;
# max_inventory 0.30 ZEC × $356 ≈ $107 max position.
# szDecimals = 2 in HL meta, so 0.03 / 0.30 are valid lots.
order_qty = 0.03
requote_threshold = 0.0005
max_inventory = 0.30

order_qty_fraction      = 0
order_qty_min           = 0.03
max_inventory_fraction  = 0

# 1 bps half-spread → 2 bps total quote width. Wider than ZEC's
# ~0.8 bps natural spread, so AS will quote outside the touch and
# rest as MAKER. This is intentional: ZEC isn't an AS-viable market
# (we expect 0 fills); the test is whether QUOTES are sane.
min_half_spread_bps = 1.0

drift_halflife_s    = 15.0
drift_suppress_bps  = 50.0
drift_suppress_sigma_mult = 10.0

slow_drift_window_s     = 120.0
slow_drift_suppress_bps = 200.0
slow_drift_suppress_sigma_mult = 20.0

tox_suppress_threshold = -100.0

vol_gate_max_bps    = 100.0
vol_gate_window_ms  = 1000
vol_gate_halt_ms    = 0
vol_gate_sigma_mult = 5.0

gamma_pnl_window_n             = 20
gamma_pnl_loss_threshold_usd   = -0.25
gamma_pnl_profit_threshold_usd = 1.0
gamma_pnl_widen_mult           = 1.5
gamma_pnl_tighten_mult         = 0.85

pause_below_rpnl_usd = -1000.0
pause_cooldown_s     = 300.0

post_fill_markout_threshold_bps = 0.0
post_fill_markout_cooldown_s    = 10.0

[fenrir.strategy.params.fair_value]
mode = "micro"
