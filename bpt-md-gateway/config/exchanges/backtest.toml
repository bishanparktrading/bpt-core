# Exchange adapter endpoints — BACKTEST mode
# Points to bpt-backtester's local WS servers instead of real exchanges.
# use_tls = false: bpt-backtester serves plain TCP WebSocket (no TLS).

[[adapters]]
exchange             = "BINANCE"
ws_host              = "127.0.0.1"
ws_port              = "18100"
ws_path              = "/stream"
use_tls              = false
ws_read_timeout_ms   = 5000

[[adapters]]
exchange             = "OKX"
ws_host              = "127.0.0.1"
ws_port              = "18101"
ws_path              = "/ws/v5/public"
use_tls              = false
ws_read_timeout_ms   = 5000

[[adapters]]
exchange             = "HYPERLIQUID"
ws_host              = "127.0.0.1"
ws_port              = "18102"
ws_path              = "/ws"
use_tls              = false
ws_read_timeout_ms   = 5000
